<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wishlist</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="container-fluid p-3 text">
      <nav class="navbar navbar-light bg-light p-3">
        <!-- Brand -->
        <h1 class="brand fw-bold">.MyShoe</h1>
        <div>
          <div class="d-flex align-items-end ms-auto">
            <a
              href="cart.html"
              class="btn btn-outline-dark me-3 position-relative"
            >
              <i class="bi bi-cart4"></i>
              <span
                id="cart-count"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              >
                0
              </span>
            </a>

            <!--Go to Home -->
            <a
              href="../HTML/../HTML/index.html"
              class="btn btn-outline-dark me-3"
            >
              <i class="bi bi-house"></i>
            </a>

            <!-- Wishlist -->
            <a href="./wishlist.html" class="btn btn-outline-danger me-2">
              <i class="fa fa-heart-o"></i>
            </a>
            <!-- Login -->
            <!-- Login Button -->
            <a
              href="../HTML/login.html"
              id="loginBtn"
              class="btn btn-outline-dark ms-2"
            >
              <i class="bi bi-person"></i>
            </a>

            <!-- Logout Button -->
            <button
              onclick="logout()"
              id="logoutBtn"
              class="btn btn-danger ms-2"
            >
              <i class="fa fa-sign-out"></i>
            </button>
          </div>
        </div>
      </nav>
    </header>
    <div class="container py-5">
        <h2 class="text-center mb-4">Your Wishlist</h2>
        <table class="table table-bordered text-center">
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="wishlist-body"></tbody>
        </table>
        </div>
 
    </div>

    
    <script src="../JS/wishlist.js"></script>
    <script src="../JS/script.js"></script>
  </body>
</html>
