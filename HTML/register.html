<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<h2 class="text-center mb-4">Register</h2>

<form id="registerForm" class="col-md-4 mx-auto">

  <input type="text" id="username" class="form-control mb-3" placeholder="Username">

  <input type="password" id="password" class="form-control mb-3" placeholder="Password">

  <button class="btn btn-primary w-100" type="submit">Register</button>

  <p class="mt-3 text-center">
    Already have account? <a href="login.html">Login</a>
  </p>

  <p id="error" class="text-danger text-center"></p>

</form>

<script src="../JS/register.js"></script>

</body>
</html>
